version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: unza-clinic-postgres
    environment:
      POSTGRES_DB: unza_hospital
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-unza@2026}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/db/migration:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - unza-clinic-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: unza-clinic-backend
    # Secrets & integration credentials (JWT secret, HR system, counseling system, mail, etc.)
    # See .env.backend.example — copy it to .env.backend and fill in real values before deploying.
    env_file:
      - .env.backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/unza_hospital
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-unza@2026}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - unza-clinic-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8080/api/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: unza-clinic-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - unza-clinic-network

volumes:
  postgres_data:

networks:
  unza-clinic-network:
    driver: bridge
